name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  verify:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: react-metronome

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: react-metronome/.nvmrc
          cache: npm
          cache-dependency-path: react-metronome/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify project
        run: npm run verify
